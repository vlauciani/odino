# Continuous integration: build, vet and test on every push/PR to the long-lived
# git-flow branches. The badge in the README reflects this workflow per branch.
name: ci

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      # Runs golangci-lint with its default linter set (no repo config needed).
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
