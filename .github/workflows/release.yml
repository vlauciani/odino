# Release pipeline: on a pushed semver tag (vX.Y.Z), GoReleaser builds the
# per-platform binaries for the GitHub Release and pushes the multi-arch image
# to GHCR. Trigger it with:  git tag v0.1.0 && git push origin v0.1.0
name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the GitHub Release and upload assets

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so GoReleaser can build the changelog

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      # Multi-arch (arm64) image builds need QEMU + Buildx.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      # Docker Hub credentials come from repo secrets (Settings → Secrets and
      # variables → Actions): DOCKER_HUB_USERNAME and a DOCKER_HUB_ACCESS_TOKEN
      # access token.
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
